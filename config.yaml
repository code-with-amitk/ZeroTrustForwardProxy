listen_addr: ":8080"
metrics_addr: ":9090"
policy_file: "policy.yaml"
ca_cert_file: "ca.crt"
ca_key_file: "ca.key"
idle_conn_timeout: 90s
max_idle_conns: 512
max_idle_conns_per_host: 128
request_timeout: 30s
max_inspect_body_bytes: 1048576
policy_dir: "/var/ztfp/policies/"
tenant_mode: dev
default_tenant: default
