default_action: allow  # allow or block
rules:
  - user: "anonymous"
    domain: "*.internal.example.com"
    action: block
  - user: "alice"
    domain: "payments.example.com"
    action: allow
  - user: "alice"
    domain: "www.google.com"
    action: allow
  - user: "*"
    domain: "www.youtube.com"
    action: block
  # ============= MCP Agent Policies =============
  # MCP agents are identified as "mcp-agent" user after JWT validation
  # These policies apply specifically to Claude CLI and other MCP-based AI agents
  - user: "mcp-agent"
    domain: "api.example.com"
    action: allow
  - user: "mcp-agent"
    domain: "*.internal.example.com"
    action: block
  - user: "mcp-agent"
    domain: "internal-service.example.com"
    action: block
  - user: "mcp-agent"
    domain: "www.google.com"
    action: block
