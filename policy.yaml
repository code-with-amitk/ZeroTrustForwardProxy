default_action: allow  # allow or block

rules:
  # Rule to block social media platforms
  - id: "1"
    name: block-social-media
    conditions:
      domains: 
        - "(facebook|instagram|twitter|tiktok|snapchat)\\.com$"
    action: block
    message: "Social Media blocked by Policy"

  # Rule to inspect MCP tool calls for execution tools
  - id: "2"
    name: mcp-block-exec-tools
    conditions:
      domains: 
        - ".*"
      methods:
        - POST
    action: inspect_mcp
    mcp:
      tool_names:
        - "(exec|shell|run_command|bash|sh|cmd|powershell)"
      message_types:
        - "tools/call"
    message: "MCP tool call blocked: execution tools are not permitted"

  # Rule to allow payments domain for authenticated users
  - id: "3"
    name: allow-payments
    conditions:
      domains:
        - "payments\\.example\\.com$"
    action: allow
    message: "Payments domain allowed"

  # Rule to allow Google for all users
  - id: "4"
    name: allow-google
    conditions:
      domains:
        - "google\\.com$"
        - "www\\.google\\.com$"
    action: allow
    message: "Google allowed"

  # Rule to block YouTube for all users
  - id: "5"
    name: block-youtube
    conditions:
      domains:
        - "youtube\\.com$"
        - "www\\.youtube\\.com$"
    action: block
    message: "YouTube is blocked by policy"

  # Rule to inspect internal domains for DLP
  - id: "6"
    name: inspect-internal-dlp
    conditions:
      domains:
        - ".*\\.internal\\.example\\.com$"
      methods:
        - POST
        - PUT
    action: inspect_dlp
    message: "Internal domain traffic inspected for data leakage"

  # Rule to block internal services
  - id: "7"
    name: block-internal-services
    conditions:
      domains:
        - "internal-service\\.example\\.com$"
    action: block
    message: "Internal services are not accessible"

  # Rule to block MCP access to internal domains
  - id: "8"
    name: mcp-block-internal
    conditions:
      domains:
        - ".*\\.internal\\.example\\.com$"
        - "internal-service\\.example\\.com$"
    action: block
    message: "MCP agents cannot access internal domains"
