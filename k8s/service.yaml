apiVersion: v1
kind: Service
metadata:
  name: ztfp
  namespace: ztfp
  labels:
    app.kubernetes.io/name: ztfp
  annotations:
    # AWS NLB — use Network Load Balancer for raw TCP (required for CONNECT proxy traffic).
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: ztfp
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
