apiVersion: v1
kind: ConfigMap
metadata:
  name: ztfp-config
  namespace: ztfp
  labels:
    app.kubernetes.io/name: ztfp
data:
  config.yaml: |
    listen_addr: ":8080"
    metrics_addr: ":9090"
    policy_file: "/etc/ztfp/policy.yaml"
    ca_cert_file: "/etc/ztfp/ca/ca.crt"
    ca_key_file:  "/etc/ztfp/ca/ca.key"
    idle_conn_timeout: 90s
    max_idle_conns: 512
    max_idle_conns_per_host: 128
    request_timeout: 30s
    max_inspect_body_bytes: 1048576
