apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ztfp
  namespace: ztfp
  labels:
    app.kubernetes.io/name: ztfp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ztfp
  minReplicas: 3
  maxReplicas: 50
  metrics:
    # Scale on CPU first — cheap, always available.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale on memory pressure to catch connection-heavy workloads.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
