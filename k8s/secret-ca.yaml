# Secret holding the shared root CA certificate and private key.
# All proxy replicas must use the SAME CA so clients trust one root cert.
#
# Populate before applying:
#   kubectl create secret generic ztfp-ca \
#     --namespace ztfp \
#     --from-file=ca.crt=./ca.crt \
#     --from-file=ca.key=./ca.key \
#     --dry-run=client -o yaml > k8s/secret-ca.yaml
#
# The placeholder values below are base64("REPLACE_ME") — never commit real keys.
apiVersion: v1
kind: Secret
metadata:
  name: ztfp-ca
  namespace: ztfp
  labels:
    app.kubernetes.io/name: ztfp
type: Opaque
data:
  ca.crt: UkVQTEFDRV9NRQ==
  ca.key: UkVQTEFDRV9NRQ==
