listen_addr: ":8080"
metrics_addr: ":9090"
policy_file: "policy.yaml"
policy_dir: "/var/ztfp/policies/"
tenant_mode: dev
default_tenant_id: 1
ca_cert_file: "/etc/ztfp/ca.crt"
ca_key_file: "/etc/ztfp/ca.key"
idle_conn_timeout: 90s
max_idle_conns: 512
max_idle_conns_per_host: 128
request_timeout: 30s
max_inspect_body_bytes: 1048576
policy_cache_size: 500
policy_load_workers: 4
